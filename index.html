<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IoT Sensor Master Race</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <script>
        // Your Firebase config (replace with your own)
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            databaseURL: "https://YOUR_PROJECT_ID-default-rtdb.firebaseio.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.appspot.com",
            messagingSenderId: "SENDER_ID",
            appId: "APP_ID"
        };
        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const playersRef = database.ref('players');

        let playerName = "";
        let currentSensorIndex = 0;
        let selectedApps = [];
        let myCurrentScore = 0;
        const TOTAL_SENSORS = 10;

        // --- IoT Curriculum Data (same as before) ---
        const sensorDatabase = [... ]; // Copy your sensorDatabase array here

        let currentOptions = [];

        function showScreen(screenId) {
            const screens = ['home', 'game', 'dashboard', 'finished'];
            screens.forEach(s => document.getElementById('screen-' + s).classList.add('hidden'));
            document.getElementById('screen-' + screenId).classList.remove('hidden');
        }

        window.onload = () => {
            showScreen('home');
            // Listen for leaderboard updates
            playersRef.on('value', (snapshot) => {
                const players = [];
                snapshot.forEach(child => {
                    players.push({
                        name: child.key,
                        score: child.val()
                    });
                });
                players.sort((a, b) => b.score - a.score);
                updateLeaderboard(players);
            });
        };

        window.joinGame = () => {
            const nameInput = document.getElementById('player-name').value.trim();
            if (!nameInput) {
                document.getElementById('name-error').classList.remove('hidden');
                return;
            }
            document.getElementById('name-error').classList.add('hidden');
            playerName = nameInput;
            myCurrentScore = 0;
            currentSensorIndex = 0;

            // Check if player already exists, if not create
            playersRef.child(playerName).transaction(currentScore => {
                return currentScore || 0;
            });

            document.getElementById('welcome-name').innerText = playerName;
            updateStudentProgressBar();
            showScreen('game');
            loadSensorLevel();
        };

        function loadSensorLevel() {
            if (currentSensorIndex >= TOTAL_SENSORS) {
                showScreen('finished');
                return;
            }
            const sensor = sensorDatabase[currentSensorIndex];
            document.getElementById('sensor-name').innerText = sensor.name;
            document.getElementById('sensor-icon').className = `fas ${sensor.icon} text-5xl text-cyan-400 mb-4`;
            currentOptions = [...sensor.correct, ...sensor.wrong];
            currentOptions.sort(() => Math.random() - 0.5);
            selectedApps = [];
            renderOptions();
            updateValidationUI();
        }

        function renderOptions() {
            const container = document.getElementById('applications-grid');
            container.innerHTML = '';
            currentOptions.forEach((opt) => {
                const btn = document.createElement('button');
                const isSelected = selectedApps.includes(opt);
                btn.className = `p-4 rounded-xl border-2 text-sm md:text-base font-bold transition-all duration-200 shadow-sm
                    ${isSelected
                        ? 'bg-cyan-600 border-cyan-400 text-white transform scale-95'
                        : 'bg-slate-800 border-slate-600 text-slate-300 hover:border-cyan-500 hover:bg-slate-700'}`;
                btn.innerHTML = `<div class="flex items-center justify-between">
                                    <span class="text-left">${opt}</span>
                                    ${isSelected ? '<i class="fas fa-check-circle text-cyan-300 ml-2"></i>' : ''}
                                </div>`;
                btn.onclick = () => toggleSelection(opt);
                container.appendChild(btn);
            });
        }

        window.toggleSelection = (optionStr) => {
            const index = selectedApps.indexOf(optionStr);
            if (index > -1) {
                selectedApps.splice(index, 1);
            } else {
                if (selectedApps.length < 4) selectedApps.push(optionStr);
            }
            renderOptions();
            updateValidationUI();
        };

        function updateValidationUI() {
            const countStr = document.getElementById('selection-count');
            const submitBtn = document.getElementById('submit-btn');
            countStr.innerText = `${selectedApps.length} / 4 Selected`;
            if (selectedApps.length === 4) {
                countStr.classList.add('text-cyan-400');
                submitBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                submitBtn.disabled = false;
            } else {
                countStr.classList.remove('text-cyan-400');
                submitBtn.classList.add('opacity-50', 'cursor-not-allowed');
                submitBtn.disabled = true;
            }
        }

        window.submitAnswer = () => {
            if (selectedApps.length !== 4) return;
            const sensor = sensorDatabase[currentSensorIndex];
            const isCorrect = selectedApps.every(app => sensor.correct.includes(app));
            const msgBox = document.getElementById('feedback-msg');
            if (isCorrect) {
                msgBox.innerHTML = '<div class="bg-green-500/20 text-green-400 border border-green-500 p-3 rounded-lg"><i class="fas fa-check-circle mr-2"></i> Perfect Match!</div>';
                // Increase score
                playersRef.child(playerName).transaction(currentScore => {
                    const newScore = (currentScore || 0) + 1;
                    return newScore;
                });
                currentSensorIndex++;
                myCurrentScore++;
                updateStudentProgressBar();
                setTimeout(() => {
                    msgBox.innerHTML = '';
                    loadSensorLevel();
                }, 1000);
            } else {
                msgBox.innerHTML = '<div class="bg-red-500/20 text-red-400 border border-red-500 p-3 rounded-lg"><i class="fas fa-times-circle mr-2"></i> Incorrect combination. Try again!</div>';
                const grid = document.getElementById('applications-grid');
                grid.classList.add('animate-pulse');
                setTimeout(() => {
                    msgBox.innerHTML = '';
                    grid.classList.remove('animate-pulse');
                    selectedApps = [];
                    renderOptions();
                    updateValidationUI();
                }, 1500);
            }
        };

        function updateStudentProgressBar() {
            const percent = (myCurrentScore / TOTAL_SENSORS) * 100;
            document.getElementById('student-progress').style.width = `${percent}%`;
            document.getElementById('student-score-text').innerText = `${myCurrentScore} / ${TOTAL_SENSORS}`;
        }

        window.leaveGame = () => {
            // Remove player from leaderboard
            playersRef.child(playerName).remove();
            location.reload();
        };

        window.openDashboard = () => {
            showScreen('dashboard');
        };

        window.closeDashboard = () => {
            showScreen('home');
        };

        window.resetGame = () => {
            if (!confirm("Are you sure? This will wipe all scores and restart the activity.")) return;
            playersRef.remove();
        };

        function updateLeaderboard(players) {
            document.getElementById('player-count').innerText = players.length;
            const list = document.getElementById('leaderboard-list');
            list.innerHTML = '';
            if (players.length === 0) {
                list.innerHTML = '<div class="text-slate-500 text-center py-16"><i class="fas fa-network-wired text-4xl mb-4 animate-pulse"></i><p>Waiting for sensor nodes to connect...</p></div>';
                return;
            }
            players.forEach((player, index) => {
                const isFinished = player.score === TOTAL_SENSORS;
                const progressPercent = (player.score / TOTAL_SENSORS) * 100;
                let rankColor = 'bg-slate-800 border-slate-700';
                let rankText = `<span class="text-xl font-bold text-slate-500">#${index + 1}</span>`;
                let statusBadge = '';
                if (isFinished) {
                    if (index === 0) {
                        rankColor = 'bg-gradient-to-r from-yellow-500/20 to-yellow-600/10 border-yellow-500 border-2 shadow-[0_0_15px_rgba(234,179,8,0.3)]';
                        rankText = '<i class="fas fa-trophy text-3xl text-yellow-400 animate-bounce"></i>';
                        statusBadge = '<span class="bg-yellow-500 text-slate-900 text-xs font-black px-2 py-1 rounded ml-3 uppercase">1st Place Master</span>';
                    } else if (index === 1) {
                        rankColor = 'bg-gradient-to-r from-slate-300/20 to-slate-400/10 border-slate-300 border-2';
                        rankText = '<i class="fas fa-medal text-2xl text-slate-300"></i>';
                        statusBadge = '<span class="bg-slate-300 text-slate-800 text-xs font-black px-2 py-1 rounded ml-3 uppercase">2nd Place</span>';
                    } else if (index === 2) {
                        rankColor = 'bg-gradient-to-r from-amber-600/20 to-amber-700/10 border-amber-600 border-2';
                        rankText = '<i class="fas fa-medal text-2xl text-amber-500"></i>';
                        statusBadge = '<span class="bg-amber-600 text-white text-xs font-black px-2 py-1 rounded ml-3 uppercase">3rd Place</span>';
                    } else {
                        statusBadge = '<span class="bg-cyan-600 text-white text-xs font-black px-2 py-1 rounded ml-3 uppercase">Finished</span>';
                    }
                }
                const item = document.createElement('div');
                item.className = `p-5 rounded-2xl border ${rankColor} transition-all duration-500 mb-4 relative overflow-hidden`;
                let progressBg = isFinished ? 'bg-cyan-500/10' : 'bg-slate-700/50';
                item.innerHTML = `
                    <div class="absolute top-0 left-0 h-full ${progressBg} transition-all duration-1000 ease-out z-0" style="width: ${progressPercent}%;"></div>
                    <div class="relative z-10 flex items-center justify-between">
                        <div class="flex items-center">
                            <div class="w-12 text-center mr-4">${rankText}</div>
                            <span class="text-2xl font-bold text-slate-100 truncate max-w-[200px]">${player.name}</span>
                            ${statusBadge}
                        </div>
                        <div class="text-right flex items-center">
                            <div class="mr-4 text-right hidden sm:block">
                                <p class="text-xs text-slate-400 font-bold uppercase">Sensors Mastered</p>
                                <p class="text-slate-300 font-medium">${player.score} / ${TOTAL_SENSORS}</p>
                            </div>
                            <span class="text-4xl font-black text-cyan-400 w-16 text-center">${progressPercent}%</span>
                        </div>
                    </div>
                `;
                list.appendChild(item);
            });
        }
    </script>
</head>
